<!--
Code for integrating CloudFlare's email protection with Hydejack's single page app loading.
-->
<script>
  document.getElementById('_pushState').addEventListener('hy-push-state-after', function (e) {
    function e(e){
      (console.error?console.error:console.log).call(console,e)
    }

    function t(e){
      return l.innerHTML='<a href="'+e.replace(/"/g,"&quot;")+'"></a>',l.childNodes[0].getAttribute("href")
    }

    function r(e,t){
      var r=e.substr(t,2);return parseInt(r,16)
    }

    function n(e,n){
      for(var o="",c=r(e,n),a=n+2;a<e.length;a+=2){
        var l=r(e,a)^c;
        o+=String.fromCharCode(l)
      }
      return t(o)
    }

    var o="/cdn-cgi/l/email-protection#",
        c=".__cf_email__",
        a="data-cfemail",
        l=document.createElement("div");

    !function(){
      for(var t=document.getElementsByTagName("a"),r=0;r<t.length;r++)
        try{
          var c=t[r],a=c.href.indexOf(o);
          a>-1&&(c.href="mailto:"+n(c.href,a+o.length))
        }catch(t){
          e(t)
        }
    }(),
    function(){
      for(var t=document.querySelectorAll(c),r=0;r<t.length;r++)
        try{
          var o=t[r],l=n(o.getAttribute(a),0),i=document.createTextNode(l);
          o.parentNode.replaceChild(i,o)
        }catch(t){
          e(t)
        }
    }()
  });
</script>

<!-- ===================================================================
     Interactivity: Sound toggle, Status widget, Konami Easter egg
     =================================================================== -->
<script>
(function() {
  'use strict';

  /* ----------------------------------------------------------------- */
  /* Sound system — Web Audio API, no files needed                     */
  /* ----------------------------------------------------------------- */
  var SFX = {
    ctx: null,
    enabled: localStorage.getItem('sfx') !== 'off',

    init: function() {
      if (!this.ctx) {
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (this.ctx.state === 'suspended') this.ctx.resume();
    },

    play: function(freq, dur, type, vol) {
      if (!this.enabled) return;
      if (!this.ctx) this.init();
      var t = this.ctx.currentTime;
      var osc = this.ctx.createOscillator();
      var gain = this.ctx.createGain();
      osc.type = type || 'square';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(vol || 0.06, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
      osc.connect(gain);
      gain.connect(this.ctx.destination);
      osc.start(t);
      osc.stop(t + dur);
    },

    /* Force play even when disabled (toggle feedback) */
    playForce: function(freq, dur, type, vol) {
      var was = this.enabled;
      this.enabled = true;
      this.play(freq, dur, type, vol);
      this.enabled = was;
    },

    click:    function() { this.play(800, 0.06, 'square', 0.05); },
    hover:    function() { this.play(600, 0.03, 'sine',   0.025); },
    navigate: function() {
      var self = this;
      [523, 659, 784].forEach(function(f, i) {
        setTimeout(function() { self.play(f, 0.08, 'sine', 0.04); }, i * 60);
      });
    },

    starPower: function() {
      var self = this;
      [523, 659, 784, 1047, 1319, 1568].forEach(function(f, i) {
        setTimeout(function() { self.play(f, 0.1, 'square', 0.07); }, i * 70);
      });
    }
  };

  /* ----------------------------------------------------------------- */
  /* Status widget — inject into sidebar                               */
  /* ----------------------------------------------------------------- */
  {% if site.data.status %}
  function injectStatus() {
    if (document.querySelector('.sidebar-status')) return;
    var sidebar = document.querySelector('.sidebar-sticky');
    if (!sidebar) return;
    var social = sidebar.querySelector('.sidebar-social');
    if (!social) return;

    var data = {{ site.data.status | jsonify }};
    var html = '<div class="status-label">STATUS</div>';

    if (data.mood) {
      html += '<div class="status-item"><span class="status-key">mood:</span>'
            + '<span class="status-val">' + data.mood + '</span></div>';
    }
    if (data.doing) {
      html += '<div class="status-item"><span class="status-key">doing:</span>'
            + '<span class="status-val">' + data.doing + '</span></div>';
    }
    if (data.music && data.music.artist) {
      html += '<div class="status-item"><span class="status-key">&#9835;</span>'
            + '<span class="status-val">' + data.music.artist
            + ' &mdash; ' + data.music.track + '</span></div>';
    }

    var widget = document.createElement('div');
    widget.className = 'sidebar-status';
    widget.innerHTML = html;
    social.parentNode.insertBefore(widget, social);
  }
  {% endif %}

  /* ----------------------------------------------------------------- */
  /* Sound toggle — sidebar footer                                     */
  /* ----------------------------------------------------------------- */
  var toggleBtn;

  function injectSoundToggle() {
    if (document.querySelector('.sidebar-sfx')) return;
    var sidebar = document.querySelector('.sidebar-sticky');
    if (!sidebar) return;
    var social = sidebar.querySelector('.sidebar-social');
    if (!social) return;

    var wrap = document.createElement('div');
    wrap.className = 'sidebar-sfx';

    toggleBtn = document.createElement('button');
    toggleBtn.className = 'sfx-toggle';
    toggleBtn.setAttribute('aria-label', 'Toggle sound effects');
    toggleBtn.setAttribute('title', 'Toggle sound effects');
    updateToggleState();

    toggleBtn.addEventListener('click', function() {
      if (!SFX.ctx) SFX.init();
      SFX.enabled = !SFX.enabled;
      localStorage.setItem('sfx', SFX.enabled ? 'on' : 'off');
      SFX.playForce(800, 0.06, 'square', 0.05);
      updateToggleState();
    });

    wrap.appendChild(toggleBtn);
    social.parentNode.insertBefore(wrap, social.nextSibling);
  }

  function updateToggleState() {
    if (!toggleBtn) return;
    toggleBtn.setAttribute('data-sfx', SFX.enabled ? 'on' : 'off');
    toggleBtn.innerHTML = SFX.enabled
      ? '<svg viewBox="0 0 24 24"><path d="M11 5L6 9H2v6h4l5 4V5z"/>'
        + '<path d="M15.54 8.46a5 5 0 010 7.07"/>'
        + '<path d="M19.07 4.93a10 10 0 010 14.14"/></svg>SFX'
      : '<svg viewBox="0 0 24 24"><path d="M11 5L6 9H2v6h4l5 4V5z"/>'
        + '<line x1="23" y1="9" x2="17" y2="15"/>'
        + '<line x1="17" y1="9" x2="23" y2="15"/></svg>SFX';
  }

  /* ----------------------------------------------------------------- */
  /* Event delegation — clicks & hovers for sound                      */
  /* ----------------------------------------------------------------- */
  document.addEventListener('click', function(e) {
    if (e.target.closest('a, button:not(.sfx-toggle)')) SFX.click();
  }, true);

  document.addEventListener('mouseover', function(e) {
    if (e.target.closest('.sidebar-nav a, .sidebar-social a')) SFX.hover();
  });

  /* Page transitions (Hydejack SPA) */
  var pushState = document.getElementById('_pushState');
  if (pushState) {
    pushState.addEventListener('hy-push-state-after', function() {
      SFX.navigate();
    });
  }

  /* ----------------------------------------------------------------- */
  /* Konami code — Superstar mode                                      */
  /* ----------------------------------------------------------------- */
  var KONAMI = [38,38,40,40,37,39,37,39,66,65];
  var konamiPos = 0;
  var superstarTimer = null;
  var starInterval = null;

  var overlay = document.createElement('div');
  overlay.className = 'superstar-overlay';
  document.body.appendChild(overlay);

  document.addEventListener('keydown', function(e) {
    if (e.keyCode === KONAMI[konamiPos]) {
      konamiPos++;
      if (konamiPos === KONAMI.length) {
        konamiPos = 0;
        activateSuperstar();
      }
    } else {
      konamiPos = 0;
    }
  });

  function activateSuperstar() {
    if (superstarTimer) return;
    if (!SFX.ctx) SFX.init();
    SFX.starPower();

    /* CRT stutter + shake on content area only — sidebar stays still */
    var content = document.querySelector('.content');
    if (content) {
      content.classList.add('superstar-crt-stutter');
      setTimeout(function() { content.classList.remove('superstar-crt-stutter'); }, 1500);
      content.classList.add('superstar-shake');
      setTimeout(function() { content.classList.remove('superstar-shake'); }, 500);
    }

    /* Delay rainbow so first stutter pulse lands on clean screen */
    setTimeout(function() { document.body.classList.add('superstar-mode'); }, 200);

    spawnStars(25);
    starInterval = setInterval(function() { spawnStars(4); }, 500);

    superstarTimer = setTimeout(function() {
      document.body.classList.remove('superstar-mode');
      clearInterval(starInterval);
      starInterval = null;
      superstarTimer = null;

      [784, 659, 523].forEach(function(f, i) {
        setTimeout(function() { SFX.play(f, 0.12, 'square', 0.05); }, i * 100);
      });
    }, 8000);
  }

  function spawnStars(count) {
    for (var i = 0; i < count; i++) {
      var star = document.createElement('div');
      star.className = 'superstar-particle';
      star.textContent = '\u2605';
      star.style.left = Math.random() * 100 + 'vw';
      star.style.top = Math.random() * 100 + 'vh';
      star.style.animationDelay = (Math.random() * 0.4) + 's';
      star.style.color = 'hsl(' + (Math.random() * 360) + ', 100%, 65%)';
      document.body.appendChild(star);
      (function(el) {
        setTimeout(function() { if (el.parentNode) el.remove(); }, 2000);
      })(star);
    }
  }

  /* ----------------------------------------------------------------- */
  /* Init                                                              */
  /* ----------------------------------------------------------------- */
  function initSidebar() {
    {% if site.data.status %}injectStatus();{% endif %}
    injectSoundToggle();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initSidebar);
  } else {
    initSidebar();
  }
})();
</script>

<!--
Example code for using Matamo as alternative analytics solution.
-->
{% if site.matomo_analytics %}
<script>
  var _paq = _paq || [];

  /*{% if site.matomo_analytics.no_cookies %}*/
  _paq.push(['disableCookies']);
  /*{% endif %}*/

  _paq.push(['trackPageView']);
  _paq.push(['enableLinkTracking']);
  _paq.push(['setTrackerUrl', u+'piwik.php']);
  _paq.push(['setSiteId', '{{site.matomo_analytics.site_id}}']);

  var pushStateEl = document.getElementById('_pushState');
  var timeStartLoadPage, referer, timeItTookToLoadPage;

  pushStateEl.addEventListener('hy-push-state-start', function() {
    timeStartLoadPage = new Date().getTime();
    referer = window.location.toString();
  });

  pushStateEl.addEventListener('hy-push-state-ready', function() {
    timeItTookToLoadPage = new Date().getTime() - timeStartLoadPage;
  });

  pushStateEl.addEventListener('hy-push-state-after', function() {
    _paq.push(['setReferrerUrl', referer]);
    _paq.push(['setCustomUrl', window.location.toString()]);
    _paq.push(['setDocumentTitle', document.title]);
    _paq.push(['deleteCustomVariables', 'page']);
    _paq.push(['setGenerationTimeMs', timeItTookToLoadPage]);
    _paq.push(['trackPageView']);
  });

  window.loadJSDeferred('{{site.matomo_analytics.root}}piwik.js');
</script>
{% endif %}
{% endcomment %}
